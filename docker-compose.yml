 services:
  # 1. Reverse Proxy (Pintu Masuk)
  nginx:
    image: nginx:latest
    container_name: web_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web_php
      - tomcat
    restart: unless-stopped

  # 2. Server PHP 7.4 (Apache)
  web_php:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: web_php_apache
    restart: unless-stopped
    volumes:
      - ./reports:/var/www/reports
      - ./php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
      # Jika menggunakan mode live-sync:
      - ./html:/var/www/html
    extra_hosts:
      - "firebird-server:172.16.16.10"
    depends_on:
      - firebird

  # 3. Server Tomcat 7 (JavaBridge & Jasper)
  tomcat:
    image: tomcat:7.0-jre8
    container_name: app_tomcat
    ports:
      - "8080:8080" # Port untuk akses JavaBridge dan Manager Tomcat
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:MaxPermSize=256m
    volumes:
      - ./tomcat/tomcat-users.xml:/usr/local/tomcat/conf/tomcat-users.xml
      - ./tomcat/manager-context.xml:/usr/local/tomcat/webapps/manager/META-INF/context.xml
      - ./tomcat/web.xml:/usr/local/tomcat/webapps/manager/WEB-INF/web.xml
      - ./tomcat/jaybird-full.jar:/usr/local/tomcat/lib/jaybird-full.jar
      - ./reports:/usr/local/tomcat/reports
      # SUNTIKKAN FOLDER WEBAPPS AGAR JAVABRIDGE PERMANEN
      - ./tomcat/JavaBridge.war:/usr/local/tomcat/webapps/JavaBridge.war
      # (Opsional) Library Jasper jika Anda menggunakannya
      - ./tomcat/jasperreports.jar:/usr/local/tomcat/lib/jasperreports.jar
      - ./tomcat/itext-2.1.7.js9.jar:/usr/local/tomcat/lib/itext-2.1.7.js9.jar
      - ./tomcat/commons-logging-1.2.jar:/usr/local/tomcat/lib/commons-logging-1.2.jar
      - ./tomcat/commons-collections-3.2.2.jar:/usr/local/tomcat/lib/commons-collections-3.2.2.jar
      - ./tomcat/commons-digester-2.1.jar:/usr/local/tomcat/lib/commons-digester-2.1.jar
      - ./tomcat/commons-beanutils-1.9.4.jar:/usr/local/tomcat/lib/commons-beanutils-1.9.4.jar
    depends_on:
      - firebird
    restart: unless-stopped

  # 4. Server Database Firebird 2.5.9 Super Classic
  firebird:
    image: jacobalberty/firebird:2.5.9-sc
    container_name: db_firebird
    environment:
      # Mengatur password default untuk user SYSDBA
      - ISC_PASSWORD=masterkey
    ports:
      # Membuka port 3050 agar bisa diakses dari aplikasi di luar Docker (seperti DBeaver/Flamerobin)
      - "3050:3050"
    volumes:
      # Tempat menyimpan file database (.fdb) Anda agar tidak hilang saat container mati
      - ./firebird/data:/firebird/data
    restart: unless-stopped
    